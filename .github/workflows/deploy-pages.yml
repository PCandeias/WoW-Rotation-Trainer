name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Verify Pages artifact contents
        run: |
          if find dist \( -name '*.map' -o -path '*/.git/*' -o -path '*/.github/*' -o -name '.env*' -o -name '*.log' \) | grep -q .; then
            echo 'Refusing to publish developer-only or sensitive files to GitHub Pages.'
            find dist \( -name '*.map' -o -path '*/.git/*' -o -path '*/.github/*' -o -name '.env*' -o -name '*.log' \)
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4